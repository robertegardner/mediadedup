<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Media Dedup{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b22;
      --panel-2: #1f232c;
      --border: #2a2f3a;
      --text: #e6e8ee;
      --muted: #8a93a3;
      --accent: #4ea1ff;
      --good: #4caf50;
      --warn: #ff9800;
      --bad: #ef5350;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      font-size: 14px; line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 12px 24px; display: flex; align-items: center; gap: 24px;
    }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header nav a {
      color: var(--muted); padding: 4px 0;
      border-bottom: 2px solid transparent;
    }
    header nav a:hover, header nav a.active {
      color: var(--text); border-bottom-color: var(--accent); text-decoration: none;
    }
    header nav { display: flex; gap: 18px; }
    main { padding: 24px; max-width: 1400px; margin: 0 auto; }
    h2 { font-size: 16px; font-weight: 600; margin: 24px 0 12px; }
    h3 { font-size: 14px; font-weight: 600; margin: 16px 0 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 16px; margin-bottom: 16px;
    }
    .grid { display: grid; gap: 16px; }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .stat { display: flex; flex-direction: column; gap: 4px; }
    .stat .v { font-size: 22px; font-weight: 600; }
    .stat .l { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left; }
    th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    a.sort-link { color: var(--muted); text-decoration: none; }
    a.sort-link:hover { color: var(--text); }
    a.sort-link.active { color: var(--text); }
    tr:hover td { background: var(--panel-2); }
    .pill {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: 11px; background: var(--panel-2); color: var(--muted);
    }
    .pill.video { background: #1e3a5f; color: #9cd0ff; }
    .pill.audio { background: #3d2d5c; color: #d0a9ff; }
    .pill.exact { background: #2d4a2d; color: #9fdf9f; }
    .pill.perceptual { background: #4a3d2d; color: #ffcb8a; }
    .pill.chromaprint { background: #4a3d2d; color: #ffcb8a; }
    .pill.reviewed { background: #2d4a2d; color: #9fdf9f; }
    .pill.failed { background: #4a2d2d; color: #ff9f9f; }
    .pill.pending { background: #3a3a3a; color: #cccccc; }
    .pill.processing { background: #1e3a5f; color: #9cd0ff; }
    button, .btn {
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); padding: 6px 14px;
      border-radius: 6px; font-size: 13px; cursor: pointer;
      font-family: inherit;
    }
    button:hover, .btn:hover { background: var(--border); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:hover { background: #3a8de0; }
    button.danger { background: var(--bad); border-color: var(--bad); color: #fff; }
    button.danger:hover { background: #d9433f; }
    .filters { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .filters select, .filters input {
      background: var(--panel-2); border: 1px solid var(--border);
      color: var(--text); padding: 6px 10px; border-radius: 6px;
      font-family: inherit; font-size: 13px;
    }
    .path { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 12px; word-break: break-all; }
    .muted { color: var(--muted); }
    .empty { padding: 48px; text-align: center; color: var(--muted); }
    .pagination { display: flex; gap: 8px; margin-top: 16px; justify-content: center; }
  </style>
</head>
<body>
  <header>
    <h1>📼 Media Dedup</h1>
    <nav>
      <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Dashboard</a>
      <a href="/groups" {% if request.url.path.startswith("/groups") %}class="active"{% endif %}>Duplicate groups</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
